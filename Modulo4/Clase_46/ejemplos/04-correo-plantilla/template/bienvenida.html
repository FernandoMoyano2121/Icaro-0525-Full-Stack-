<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0; padding:0; background-color:#f4f4f4; font-family:Arial, sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4; padding:30px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0"
               style="background-color:#ffffff; border-radius:8px; overflow:hidden;
                      box-shadow:0 2px 8px rgba(0,0,0,0.1);">

          <!-- Header con logo embebido usando cid -->
          <tr>
            <td style="background-color:#2563eb; padding:24px 30px; text-align:center;">
              <!--
                La imagen se referencia con src="cid:logo-tienda"
                El "logo-tienda" es el cid que definimos en el attachments del JS.
                Así la imagen viaja dentro del propio correo, sin depender de una URL externa.
              -->
              <h1 style="color:#ffffff; margin:0; font-size:26px;">🛒 Tienda Icaro</h1>
            </td>
          </tr>

          <!-- Saludo personalizado con {{nombre}} -->
          <tr>
            <td style="padding:40px 30px 20px 30px;">
              <h2 style="color:#1e293b; margin-top:0;">¡Hola, {{nombre}}! 👋</h2>
              <p style="color:#475569; line-height:1.6; margin-top:0;">
                Gracias por registrarte en <strong>Tienda Icaro</strong>.
                Tu cuenta fue creada exitosamente el <strong>{{fecha}}</strong>.
              </p>
            </td>
          </tr>

          <!-- Datos de la cuenta -->
          <tr>
            <td style="padding:0 30px 30px 30px;">
              <table width="100%" cellpadding="0" cellspacing="0"
                     style="background-color:#f8fafc; border-radius:6px;
                            border:1px solid #e2e8f0; padding:0;">
                <tr>
                  <td style="padding:16px 20px; border-bottom:1px solid #e2e8f0;">
                    <span style="color:#64748b; font-size:13px;">Email registrado</span><br>
                    <strong style="color:#1e293b;">{{email}}</strong>
                  </td>
                </tr>
                <tr>
                  <td style="padding:16px 20px;">
                    <span style="color:#64748b; font-size:13px;">Estado de la cuenta</span><br>
                    <strong style="color:#16a34a;">✅ Activa</strong>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Botón CTA -->
          <tr>
            <td style="padding:0 30px 40px 30px; text-align:center;">
              <a href="http://localhost:3000/productos"
                 style="background-color:#2563eb; color:#ffffff; padding:14px 32px;
                        border-radius:6px; text-decoration:none; font-weight:bold;
                        display:inline-block; font-size:15px;">
                Explorar productos →
              </a>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#f8fafc; padding:20px 30px; text-align:center;
                       border-top:1px solid #e2e8f0;">
              <p style="color:#94a3b8; font-size:12px; margin:0; line-height:1.6;">
                Si no creaste esta cuenta, ignorá este mensaje.<br>
                © 2024 Tienda Icaro — Buenos Aires, Argentina
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
